  <rect class="node" x="224" y="112" width="136" height="54"/>
  <text class="label" x="292" y="133"><tspan x="292" dy="0">全局有序</tspan><tspan x="292" dy="17">KV Keyspace</tspan></text>

  <rect class="node" x="404" y="112" width="138" height="54"/>
