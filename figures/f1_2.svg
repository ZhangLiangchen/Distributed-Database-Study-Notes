<svg id="sv_f1_2" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 1240px; background-color: white;" viewBox="0 0 1240 440" role="img" aria-label="图 1-2 分片正常读写/调度路径">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      #sv_f1_2 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      #sv_f1_2 .panel { fill: #ffffff; stroke: #aab0bb; stroke-width: 1.2; }
      #sv_f1_2 .node { fill: #ffffff; stroke: #9370db; stroke-width: 1.2; rx: 4; }
      #sv_f1_2 .title { fill: #111827; font-size: 15px; font-weight: 700; text-anchor: middle; }
      #sv_f1_2 .label { fill: #1f2937; font-size: 13px; text-anchor: middle; dominant-baseline: middle; }
      #sv_f1_2 .edge { fill: none; stroke: #333333; stroke-width: 1.2; marker-end: url(#arrow); }
      #sv_f1_2 .dashed { stroke-dasharray: 5 4; }
      #sv_f1_2 .edgeText { fill: #374151; font-size: 10px; text-anchor: middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1240" height="440" fill="#ffffff"/>

  <rect class="panel" x="20" y="26" width="585" height="388"/>
