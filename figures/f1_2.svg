  <rect class="node" x="68" y="266" width="156" height="70"/>
  <text class="label" x="146" y="285"><tspan x="146" dy="0">PD</tspan><tspan x="146" dy="17">心跳上报</tspan><tspan x="146" dy="17">split / merge / balance</tspan></text>

  <rect class="node" x="276" y="274" width="128" height="54"/>
