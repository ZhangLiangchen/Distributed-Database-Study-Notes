<svg id="sv_f3_1" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 1040px; background-color: white;" viewBox="0 0 1040 300" role="img" aria-label="图 3-1 TiKV 与 OceanBase 共识栈并列分层">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      #sv_f3_1 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      #sv_f3_1 .panel { fill: #ffffff; stroke: #aab0bb; stroke-width: 1.2; }
      #sv_f3_1 .node { fill: #ffffff; stroke: #9370db; stroke-width: 1.2; rx: 4; }
      #sv_f3_1 .title { fill: #111827; font-size: 16px; font-weight: 700; text-anchor: middle; }
      #sv_f3_1 .label { fill: #1f2937; font-size: 13px; text-anchor: middle; dominant-baseline: middle; }
      #sv_f3_1 .edge { fill: none; stroke: #333333; stroke-width: 1.2; marker-end: url(#arrow); }
      #sv_f3_1 .small { fill: #374151; font-size: 11px; text-anchor: middle; }
    </style>
  </defs>
  <rect x="0" y="0" width="1040" height="300" fill="#ffffff"/>
  <rect class="panel" x="24" y="36" width="480" height="218"/>
  <text class="title" x="264" y="66">TiKV 侧：Multi-Raft over raft-rs</text>
  <rect class="node" x="54" y="130" width="112" height="58"/>
  <text class="label" x="110" y="151"><tspan x="110" dy="0">RaftKV</tspan><tspan x="110" dy="17">propose</tspan></text>
  <rect class="node" x="204" y="116" width="144" height="86"/>
  <text class="label" x="276" y="137"><tspan x="276" dy="0">raft-rs</tspan><tspan x="276" dy="17">Multi-Raft</tspan><tspan x="276" dy="17">选举 / 复制 / 安全性</tspan></text>
  <rect class="node" x="386" y="130" width="92" height="58"/>
  <text class="label" x="432" y="151"><tspan x="432" dy="0">Raft Engine</tspan><tspan x="432" dy="17">日志落盘</tspan></text>
  <path class="edge" d="M166 159 H204"/>
  <path class="edge" d="M348 159 H386"/>
  <text class="small" x="276" y="224">算法库、raftstore 调度层、日志存储三层分离</text>

  <rect class="panel" x="536" y="36" width="480" height="218"/>
  <text class="title" x="776" y="66">OceanBase 侧：Multi-Paxos over PALF</text>
  <rect class="node" x="568" y="130" width="112" height="58"/>
  <text class="label" x="624" y="151"><tspan x="624" dy="0">事务</tspan><tspan x="624" dy="17">redo</tspan></text>
  <rect class="node" x="720" y="116" width="144" height="86"/>
  <text class="label" x="792" y="137"><tspan x="792" dy="0">PALF / Paxos</tspan><tspan x="792" dy="17">多数派复制</tspan><tspan x="792" dy="17">Leader 与日志协同</tspan></text>
  <rect class="node" x="904" y="130" width="86" height="58"/>
  <text class="label" x="947" y="151"><tspan x="947" dy="0">日志</tspan><tspan x="947" dy="17">落盘</tspan></text>
  <path class="edge" d="M680 159 H720"/>
  <path class="edge" d="M864 159 H904"/>
  <text class="small" x="776" y="224">共识、WAL、事务状态推进深度耦合</text>
</svg>
